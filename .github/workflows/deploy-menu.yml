name: Deploy 2H Frites Menu

on:
  push:
    branches:
      - claude/mobile-menu-frites-app-jRtBw
      - master
    paths:
      - '2h-frites/**'
      - '.github/workflows/deploy-menu.yml'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: 2h-frites/package-lock.json

      - name: Install dependencies
        working-directory: 2h-frites
        run: npm ci

      - name: Build static site
        working-directory: 2h-frites
        env:
          PAGES_BASE_PATH: /assets
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 2h-frites/out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
